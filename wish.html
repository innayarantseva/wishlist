<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>Inna's Wishlist</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main id="app">
    <nav>
      <a href="index.html" class="back-link">&larr; Back to list</a>
    </nav>
    <article class="wish-detail">
      <img id="detail-img" src="" alt="">
      <h2 id="detail-title"></h2>
      <p id="detail-desc" class="description"></p>
      <div class="meta">
        <span id="detail-price" class="price"></span>
        <span id="detail-priority" class="priority"></span>
      </div>
      <a id="detail-link" href="" target="_blank" rel="noopener noreferrer">View item &rarr;</a>
    </article>
  </main>

  <script src="data/wishes.js"></script>
  <script src="detail.js"></script>
</body>
</html>
