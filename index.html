<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Things I'd love to get for myself, but keep telling myself there are more important expenses">
  <meta name="color-scheme" content="light dark">
  <title>Inna's Wishlist</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <header>
    <h1>🌿 Inna's Wishlist</h1>
    <nav aria-label="Filter by category">
      <category-filter></category-filter>
    </nav>
  </header>

  <main>
    <div class="wish-grid"></div>

  </main>

  <template id="wish-card-tpl">
    <a class="wish-card" href="">
      <img src="" alt="" loading="lazy" width="400" height="400">
      <h2></h2>
      <div class="meta">
        <span class="price"></span>
        <span class="priority"></span>
      </div>
    </a>
  </template>

  <script type="speculationrules">
    {
      "prerender": [{
        "where": { "selector_matches": ".wish-card" },
        "eagerness": "moderate"
      }]
    }
  </script>

  <script type="module" src="main.js"></script>
</body>
</html>
